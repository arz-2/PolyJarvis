[pytest]
# Pure-logic test suites that run without external binaries.
testpaths =
    tests
    mcp-servers/mcp-lammps-engine/tests
    mcp-servers/mcp-emc-server/tests
    mcp-servers/mcp-mol-builder-server/tests

# Tests that shell out to EMC/LAMMPS/RadonPy must be marked so they can be
# skipped by default and in CI. Run them explicitly with: pytest -m requires_binaries
markers =
    requires_binaries: test needs an external simulation binary (EMC, LAMMPS, RadonPy) installed

addopts = -m "not requires_binaries"
